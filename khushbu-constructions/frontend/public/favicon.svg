<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square - amber/brand color -->
  <rect width="64" height="64" rx="14" fill="#F59E0B"/>

  <!-- Construction crane arm (horizontal top bar) -->
  <rect x="10" y="10" width="44" height="4" rx="2" fill="#ffffff"/>

  <!-- Crane vertical pole -->
  <rect x="14" y="10" width="4" height="28" rx="1.5" fill="#ffffff"/>

  <!-- Crane horizontal arm support line (cable) -->
  <line x1="16" y1="12" x2="42" y2="22" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Hanging hook block -->
  <rect x="38" y="22" width="8" height="6" rx="1.5" fill="#1E293B"/>
  <line x1="42" y1="28" x2="42" y2="33" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Building base / structure being built -->
  <!-- Foundation -->
  <rect x="10" y="50" width="44" height="4" rx="1" fill="#1E293B"/>

  <!-- Building floors (3 floors, white outline style) -->
  <rect x="14" y="38" width="36" height="12" rx="1" fill="#1E293B"/>
  <rect x="14" y="38" width="36" height="12" rx="1" fill="none" stroke="#ffffff" stroke-width="1.2"/>

  <!-- Floor windows row 1 -->
  <rect x="18" y="41" width="5" height="5" rx="0.8" fill="#F59E0B"/>
  <rect x="26" y="41" width="5" height="5" rx="0.8" fill="#F59E0B"/>
  <rect x="34" y="41" width="5" height="5" rx="0.8" fill="#ffffff" opacity="0.5"/>
  <rect x="42" y="41" width="5" height="5" rx="0.8" fill="#F59E0B"/>

  <!-- Small "KC" text at bottom center -->
  <!-- K letter -->
  <rect x="24" y="52.5" width="1.8" height="7" rx="0.5" fill="#1E293B"/>
  <line x1="25.8" y1="56" x2="29" y2="52.5" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25.8" y1="56" x2="29" y2="59.5" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
  <!-- C letter -->
  <path d="M32 53 Q30.5 53 30.5 56 Q30.5 59 32 59" stroke="#1E293B" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</svg>
